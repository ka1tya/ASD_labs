<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Лабораторна робота №4</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Лабораторна робота №4</h2>
    <p class="info" id="info"></p>

    <h3>Графи (k<sub>1</sub>)</h3>
    <div class="graphs">
      <div class="graph-block">
        <h4>Напрямлений граф (k<sub>1</sub>)</h4>
        <canvas id="dirCanvas1" width="700" height="490"></canvas>
      </div>
      <div class="graph-block">
        <h4>Ненапрямлений граф (k<sub>1</sub>)</h4>
        <canvas id="undirCanvas1" width="700" height="490"></canvas>
      </div>
    </div>
    <div class="matrices">
      <div class="mat-block">
        <h4>Матриця суміжності (напрямлений) (k<sub>1</sub>)</h4>
        <table id="tDir1"></table>
      </div>
      <div class="mat-block">
        <h4>Матриця суміжності (ненапрямлений) (k<sub>1</sub>)</h4>
        <table id="tUndir1"></table>
      </div>
    </div>

    <div class="results" id="results1"></div>

    <script src="graphs.js"></script>
  </body>
</html>
