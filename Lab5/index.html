<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Лабораторна робота №5</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Лабораторна робота №5</h2>
    <p class="info" id="info"></p>

    <h3>Напрямлений граф</h3>
    <canvas id="graphCanvas" width="700" height="490"></canvas>

    <h3>Матриця суміжності</h3>
    <div class="mat-block">
      <table id="tDir"></table>
    </div>

    <div class="protocol" id="protocol">
      Натисніть "Наступний крок" щоб почати обхід
    </div>

    <div id="bfsResults" style="display: none">
      <h3>Результати BFS</h3>

      <h4>Вектор відповідності (вершина → порядок відвідування)</h4>
      <div class="results" id="bfsVector"></div>

      <h4>Матриця суміжності дерева обходу</h4>
      <div class="mat-block">
        <table id="tTree"></table>
      </div>
    </div>

    <script src="graphs.js"></script>
  </body>
</html>
